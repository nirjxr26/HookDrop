---
- name: Check if Docker is installed
  command: docker --version
  register: docker_check
  ignore_errors: true
  changed_when: false

- name: Install Docker (macOS with Homebrew)
  block:
    - homebrew:
        name: docker
        state: present
    - homebrew_cask:
        name: docker
        state: present
  when: 
    - ansible_facts['os_family'] == "Darwin"
    - docker_check.rc != 0
    - not ansible_check_mode
  become: "{{ not ansible_check_mode }}"

- name: Install Docker (Ubuntu/Debian)
  block:
    - apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
    - apt:
        name: 
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true
  when: 
    - ansible_facts['os_family'] == "Debian"
    - docker_check.rc != 0
    - not ansible_check_mode
  become: "{{ not ansible_check_mode }}"

- name: Install Go 1.22+ (macOS)
  homebrew:
    name: go
    state: present
  when: ansible_facts['os_family'] == "Darwin"
  become: false

- name: Install Go 1.22+ (Ubuntu/Debian)
  block:
    - apt:
        name: golang-go
        state: present
        update_cache: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - not ansible_check_mode
  become: "{{ not ansible_check_mode }}"

- name: Check if kubectl is already present
  stat:
    path: /usr/local/bin/kubectl
  register: kubectl_path
  changed_when: false

- name: Install kubectl
  block:
    - set_fact:
        kubectl_version: "{{ lookup('url', 'https://dl.k8s.io/release/stable.txt') | trim }}"

    - get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/{{ ansible_facts['system'] | lower }}/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'
  become: "{{ not ansible_check_mode }}"
  when:
    - not ansible_check_mode
    - not kubectl_path.stat.exists

- name: Install helm
  block:
    - shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      changed_when: false
  become: "{{ not ansible_check_mode }}"
  when: not ansible_check_mode

- name: Install kind
  block:
    - get_url:
        url: "https://kind.sigs.k8s.io/dl/latest/kind-{{ ansible_facts['system'] | lower }}-amd64"
        dest: /usr/local/bin/kind
        mode: '0755'
  become: "{{ not ansible_check_mode }}"
  when: not ansible_check_mode

- name: Install argocd CLI
  block:
    - shell: |
        curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-{{ ansible_facts['system'] | lower }}-amd64
        chmod +x /usr/local/bin/argocd
      changed_when: false
  become: "{{ not ansible_check_mode }}"
  when: not ansible_check_mode

- name: Install trivy
  block:
    - shell: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      changed_when: false
  become: "{{ not ansible_check_mode }}"
  when: not ansible_check_mode

- name: Install golangci-lint
  block:
    - shell: |
        set -euo pipefail
        export GOBIN=/usr/local/bin
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      changed_when: false
  become: "{{ not ansible_check_mode }}"
  when: not ansible_check_mode

- name: Verify installations
  block:
    - command: "{{ item.command }}"
      register: version_checks
      loop:
        - { name: docker, command: "docker --version" }
        - { name: kubectl, command: "kubectl version --client --output=yaml" }
        - { name: helm, command: "helm version --short" }
        - { name: kind, command: "kind --version" }
        - { name: argocd, command: "argocd version --client" }
        - { name: trivy, command: "trivy --version" }
        - { name: golangci-lint, command: "golangci-lint --version" }
      changed_when: false

    - debug:
        msg: "✓ {{ item.item.name }}: {{ item.stdout.split('\n')[0] | default(item.stderr.split('\n')[0] | default('ok')) }}"
      loop: "{{ version_checks.results }}"
  when: not ansible_check_mode
