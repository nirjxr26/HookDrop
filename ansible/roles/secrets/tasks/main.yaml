---
- name: Add Sealed Secrets Helm repository
  kubernetes.core.helm_repository:
    name: sealed-secrets
    repo_url: "{{ sealed_secrets_helm_repo }}"
    state: present

- name: Install Sealed Secrets using Helm
  kubernetes.core.helm:
    name: "{{ sealed_secrets_release_name }}"
    chart_ref: "{{ sealed_secrets_helm_chart }}"
    release_namespace: "{{ sealed_secrets_namespace }}"
    create_namespace: true
    values:
      fullnameOverride: sealed-secrets-controller

- name: Wait for Sealed Secrets controller deployment
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: "{{ sealed_secrets_namespace }}"
    name: sealed-secrets-controller
  register: sealed_secrets_deploy
  until: sealed_secrets_deploy.resources | length > 0 and sealed_secrets_deploy.resources[0].status.readyReplicas | default(0) >= 1
  retries: 30
  delay: 10

- name: Get Sealed Secrets public key
  shell: kubectl get secret -n kube-system -l sealedsecrets.bitnami.com/status=active -o jsonpath='{.items[0].data.tls\.crt}' | base64 -d
  register: sealed_secrets_key
  changed_when: false

- name: Create local backup directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.sealed-secrets"
    state: directory
    mode: '0700'

- name: Save Sealed Secrets public key locally
  copy:
    content: "{{ sealed_secrets_key.stdout }}"
    dest: "{{ lookup('env', 'HOME') }}/.sealed-secrets/sealing-key.crt"
    mode: '0600'

- name: Display Sealed Secrets installation info
  debug:
    msg: |
      ✓ Sealed Secrets installed successfully
      
      Public key backed up to: {{ lookup('env', 'HOME') }}/.sealed-secrets/sealing-key.crt
      
      To encrypt a secret:
      echo -n 'your-secret' | kubectl create secret generic my-secret --dry-run=client --from-file=- -o yaml | kubeseal -f - > sealed-secret.yaml
      
      To view sealed secret:
      kubectl get sealedsecrets -A
