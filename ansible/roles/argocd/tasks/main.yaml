---
- name: Create ArgoCD namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ argocd_namespace }}"
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"

- name: Install ArgoCD
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('url', argocd_manifest_url) }}"
    namespace: "{{ argocd_namespace }}"
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"

- name: Wait for ArgoCD server deployment
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ argocd_namespace }}"
    name: argocd-server
  register: argocd_server
  until:
    - argocd_server.resources | length > 0
    - (argocd_server.resources[0].status.readyReplicas | default(0)) == (argocd_server.resources[0].spec.replicas | default(1))
  retries: 30
  delay: 10
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"

- name: Wait for ArgoCD repo-server deployment
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ argocd_namespace }}"
    name: argocd-repo-server
  register: argocd_repo
  until:
    - argocd_repo.resources | length > 0
    - (argocd_repo.resources[0].status.readyReplicas | default(0)) == (argocd_repo.resources[0].spec.replicas | default(1))
  retries: 30
  delay: 10
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"

- name: Retrieve ArgoCD initial admin password
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ argocd_namespace }}"
    name: argocd-initial-admin-secret
  register: argocd_secret
  until: argocd_secret.resources | length > 0
  retries: 10
  delay: 5
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"

- name: Decode ArgoCD password
  set_fact:
    argocd_password: "{{ argocd_secret.resources[0].data.password | b64decode }}"

- name: Display ArgoCD access info
  debug:
    msg: |
      ✓ ArgoCD installed successfully

      Access ArgoCD UI:
      1. Forward port:
         kubectl port-forward svc/argocd-server -n argocd {{ argocd_port_forward }}:443

      2. URL:
         https://localhost:{{ argocd_port_forward }}

      3. Username:
         admin

      4. Password:
         {{ argocd_password }}

      Apply Application manifest:
      kubectl apply -f k8s/argo cd/application.yaml