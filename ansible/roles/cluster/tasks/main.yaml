---
- name: Check if kind cluster already exists
  shell: kind get clusters 2>/dev/null | grep -c "{{ kind_cluster_name }}" || echo "0"
  register: cluster_exists
  changed_when: false

- name: Delete existing cluster if present
  command: kind delete cluster --name "{{ kind_cluster_name }}"
  when: cluster_exists.stdout | int > 0
  register: delete_cluster
  changed_when: false

- name: Create kind cluster
  command: kind create cluster --config "{{ kind_config_path }}" --name "{{ kind_cluster_name }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: create_cluster

- name: Wait for cluster to be ready
  shell: |
    kubectl cluster-info 2>/dev/null && \
    kubectl wait --for=condition=Ready nodes --all --timeout=300s
  retries: 3
  delay: 5
  register: cluster_ready
  changed_when: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Verify cluster connectivity
  shell: kubectl get nodes
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: nodes_info
  changed_when: false

- name: Display cluster info
  debug:
    msg: |
      ✓ Kind cluster '{{ kind_cluster_name }}' created successfully
      Nodes:
      {{ nodes_info.stdout }}
