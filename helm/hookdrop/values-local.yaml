replicaCount: 1

image:
  repository: hookdrop
  tag: "local"
  pullPolicy: Never

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  host: hookdrop.local

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  PORT: "8080"
  LOG_LEVEL: "info"
  OTEL_SERVICE_NAME: "hookdrop"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.observability.svc.cluster.local:4317"

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

monitoring:
  serviceMonitor:
    enabled: true
    interval: 15s
  prometheusRule:
    enabled: true
    errorRateThreshold: 0.05

networkPolicy:
  enabled: true
