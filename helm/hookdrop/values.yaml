replicaCount: 1

image:
  repository: hookdrop
  tag: "sha-4a8159f8bd0da61d69c29c6935e63824b08b401b"
  pullPolicy: IfNotPresent

imagePullSecrets: []

ecrRefresher:
  enabled: false
  schedule: "0 */8 * * *"
  region: "us-east-1"
  registry: "654654364687.dkr.ecr.us-east-1.amazonaws.com"
  secretName: "ecr-key"
  awsCredentialsSecret: "aws-credentials"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  host: hookdrop.local

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
    ephemeral-storage: "1Gi"
  limits:
    cpu: "500m"
    memory: "512Mi"
    ephemeral-storage: "2Gi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  PORT: "8080"
  LOG_LEVEL: "info"
  OTEL_SERVICE_NAME: "hookdrop"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.observability.svc.cluster.local:4317"

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

monitoring:
  serviceMonitor:
    enabled: true
    interval: 15s
  prometheusRule:
    enabled: true
    errorRateThreshold: 0.05

networkPolicy:
  enabled: true
