name: reusable-build

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: ap-south-1
      publish:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      AWS_ROLE_ARN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      ECR_REPOSITORY: ${{ inputs.ecr_repository }}
      AWS_REGION: ${{ inputs.aws_region }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go 1.25.10
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.25.10"

      - name: Cache Go modules
        uses: actions/cache@1bd1e32a3bdc45062d1976a16315570220621146 # v4.2.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@aaa42aa0628b4ae2578232a66b541047968fac86 # v6.1.0
        with:
          version: v2.1.6
          install-mode: goinstall
          skip-cache: true

      - name: Configure AWS credentials
        if: inputs.publish
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Ensure ECR repository exists
        if: inputs.publish
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" --region "${AWS_REGION}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${ECR_REPOSITORY}" --region "${AWS_REGION}"

      - name: Login to Amazon ECR
        id: login-ecr
        if: inputs.publish
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Build Docker image
        run: docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          scan-type: config
          scan-ref: ./helm
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Push image to ECR
        if: inputs.publish
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Install Cosign
        if: inputs.publish
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign image with Cosign (keyless)
        if: inputs.publish
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Update Helm image tag
        if: inputs.publish
        run: |
          sed -i "s/^  tag: .*/  tag: \"${IMAGE_TAG}\"/" helm/hookdrop/values-prod.yaml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add helm/hookdrop/values-prod.yaml
          git commit -m "ci: update image tag to ${IMAGE_TAG} [skip ci]" || exit 0
          git push
