apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-non-root
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: containers-must-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - hookdrop
      exclude:
        any:
          - resources:
              selector:
                matchLabels:
                  app: ecr-registry-refresher
      validate:
        message: "Containers in hookdrop namespace must set securityContext.runAsNonRoot=true."
        pattern:
          spec:
            containers:
              - securityContext:
                  runAsNonRoot: true
